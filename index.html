<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>PAÑPURI Sales Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FBFBFA; color: #1a1a1a; }
        .brand-font { font-family: 'Playfair Display', serif; }
        .tab-active { border-bottom: 2px solid #A68966; color: #A68966; font-weight: 600; }
        .card { background: white; border-radius: 8px; border: 1px solid #efefef; }
        .picking-qty { background-color: #fdfaf6; color: #A68966; font-size: 1.25rem; font-weight: 700; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
        <div>
            <h1 class="text-4xl brand-font tracking-tighter uppercase mb-1">PAÑPURI</h1>
            <p class="text-[10px] tracking-[0.3em] font-bold text-gray-400 uppercase">Executive Sales & Inventory</p>
        </div>
        
        <div class="flex flex-wrap items-center gap-4 bg-white p-3 rounded-lg border shadow-sm no-capture">
            <div id="statusIndicator" class="text-[10px] font-bold px-2 py-1 rounded bg-gray-100 text-gray-500 uppercase">Master: Waiting</div>
            <div class="border-r pr-4">
                <input type="date" id="datePicker" value="2026-02-14" class="text-sm font-semibold outline-none cursor-pointer">
            </div>
            <label for="csvFiles" class="bg-black text-white px-6 py-2 rounded text-[10px] font-bold uppercase tracking-widest cursor-pointer hover:bg-gray-800 transition">Select CSV</label>
            <input type="file" id="csvFiles" multiple accept=".csv" class="hidden">
            <button onclick="copyImage()" class="border border-black px-6 py-2 rounded text-[10px] font-bold uppercase tracking-widest">Copy Image</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <div class="flex gap-8 mb-6 border-b border-gray-100 no-capture">
            <button onclick="switchTab('raw')" id="tab-raw" class="tab-active pb-3 text-xs uppercase tracking-widest">Sales Raw Data</button>
            <button onclick="switchTab('summary')" id="tab-summary" class="pb-3 text-xs uppercase tracking-widest text-gray-400">Picking Summary</button>
        </div>

        <div id="view-raw" class="card overflow-hidden">
            <div class="overflow-x-auto max-h-[600px]">
                <table class="w-full text-[11px] text-left">
                    <thead class="sticky top-0 bg-white shadow-sm text-gray-400 uppercase">
                        <tr>
                            <th class="p-4">Time</th>
                            <th class="p-4">Shop</th>
                            <th class="p-4">Mat Code</th>
                            <th class="p-4">Description</th>
                            <th class="p-4 text-center">Qty</th>
                            <th class="p-4 text-right">Net Sale</th>
                        </tr>
                    </thead>
                    <tbody id="rawTableBody" class="text-gray-600">
                        <tr><td colspan="6" class="p-20 text-center italic text-gray-300">Upload CSV to view data</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="view-summary" class="hidden space-y-6">
            <div id="summaryContainer"></div>
        </div>
    </div>

    <script>
        let allRawData = [];
        let productMaster = {};

        // 1. ดึงข้อมูล Master และแก้ปัญหา Data Type
        window.onload = function() {
            const status = document.getElementById('statusIndicator');
            google.script.run.withSuccessHandler(function(data) {
                if(!data) { status.innerText = "Master: Error"; return; }
                data.forEach((row, i) => {
                    if(i === 0) return;
                    // แปลง Mat Code เป็น String และตัด .0
                    let cleanCode = String(row[0]).trim().split('.')[0];
                    let brandName = String(row[7]).trim().toUpperCase();
                    if (brandName.includes("PANPURI")) {
                        productMaster[cleanCode] = { section: String(row[5] || 'GENERAL') };
                    }
                });
                status.innerText = `Master: ${Object.keys(productMaster).length} Items`;
                status.className = "text-[10px] font-bold px-2 py-1 rounded bg-green-100 text-green-700 uppercase";
            }).getSheetData();
        };

        // 2. จัดการไฟล์ CSV
        document.getElementById('csvFiles').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            allRawData = [];

            let filesProcessed = 0;
            files.forEach(file => {
                const day = parseInt(file.name.substring(0, 2)) || 14;
                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        results.data.forEach(row => {
                            let rawCode = row['MAT.CODE'] || row['MAT CODE'];
                            let shop = row['SHOP NAME'] || "";
                            if (!rawCode || shop.includes('TOTAL')) return;

                            let cleanCode = String(rawCode).trim().split('.')[0];
                            if (productMaster[cleanCode]) {
                                let qty = parseInt(String(row['QUANTITY'] || 0).replace(/,/g, ''));
                                let sale = parseFloat(String(row['NETSALE'] || 0).replace(/,/g, '').replace(/"/g, ''));
                                
                                allRawData.push({
                                    day, code: cleanCode, qty, sale,
                                    shop: shop.includes('TE1') ? 'TE1' : (shop.includes('TE3') ? 'TE3' : 'TW4'),
                                    time: (row['DATE TIME'] || "").split(' ')[1] || '00:00',
                                    desc: row['DESCRIPTION'] || "",
                                    section: productMaster[cleanCode].section
                                });
                            }
                        });
                        filesProcessed++;
                        if (filesProcessed === files.length) renderViews();
                    }
                });
            });
        });

        function renderViews() {
            const day = parseInt(document.getElementById('datePicker').value.split('-')[2]);
            const filtered = allRawData.filter(d => d.day === day);
            
            // Raw Table
            const body = document.getElementById('rawTableBody');
            body.innerHTML = filtered.length ? filtered.map(d => `
                <tr class="border-b border-gray-50">
                    <td class="p-4 text-gray-400">${d.time}</td>
                    <td class="p-4 font-bold">${d.shop}</td>
                    <td class="p-4 font-mono">${d.code}</td>
                    <td class="p-4 uppercase">${d.desc}</td>
                    <td class="p-4 text-center font-bold">${d.qty}</td>
                    <td class="p-4 text-right">฿${d.sale.toLocaleString()}</td>
                </tr>`).join('') : '<tr><td colspan="6" class="p-10 text-center text-gray-300">No data found</td></tr>';

            // Summary Table
            const container = document.getElementById('summaryContainer');
            const grouped = {};
            filtered.forEach(d => {
                if (!grouped[d.section]) grouped[d.section] = {};
                if (!grouped[d.section][d.code]) grouped[d.section][d.code] = { desc: d.desc, qty: 0 };
                grouped[d.section][d.code].qty += d.qty;
            });

            container.innerHTML = Object.keys(grouped).sort().map(sec => `
                <div class="card mb-6 overflow-hidden">
                    <div class="bg-black p-3 text-white text-[10px] font-bold uppercase tracking-widest">${sec}</div>
                    <table class="w-full text-[11px]">
                        <thead class="bg-gray-50 text-gray-400 uppercase"><tr class="border-b"><th class="p-4 w-32">Code</th><th class="p-4 text-left">Description</th><th class="p-4 text-center w-24">Qty</th></tr></thead>
                        <tbody>${Object.keys(grouped[sec]).map(code => `
                            <tr class="border-b border-gray-50"><td class="p-4 font-mono">${code}</td><td class="p-4 font-semibold uppercase">${grouped[sec][code].desc}</td><td class="p-4 text-center picking-qty">${grouped[sec][code].qty}</td></tr>`).join('')}</tbody>
                    </table>
                </div>`).join('');
        }

        function switchTab(t) {
            document.getElementById('view-raw').classList.toggle('hidden', t !== 'raw');
            document.getElementById('view-summary').classList.toggle('hidden', t !== 'summary');
            document.getElementById('tab-raw').className = t === 'raw' ? 'tab-active pb-3 text-xs uppercase' : 'text-gray-400 pb-3 text-xs uppercase';
            document.getElementById('tab-summary').className = t === 'summary' ? 'tab-active pb-3 text-xs uppercase' : 'text-gray-400 pb-3 text-xs uppercase';
        }

        function copyImage() {
            const els = document.querySelectorAll('.no-capture');
            els.forEach(e => e.style.visibility = 'hidden');
            html2canvas(document.body, { scale: 2 }).then(canvas => {
                canvas.toBlob(blob => {
                    navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(() => {
                        alert("Copied!");
                        els.forEach(e => e.style.visibility = 'visible');
                    });
                });
            });
        }
    </script>
</body>
</html>
